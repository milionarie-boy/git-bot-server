# render.yaml
services:
  - type: web
    name: email-tracking-server
    runtime: python
    repo: https://github.com/yourusername/your-repo
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0